# Render Blueprint — backend FastAPI do AvaliaEDU (Squad 32)
# Importe em: Render Dashboard > New > Blueprint > selecione este repositório.
# As variáveis marcadas com sync:false você preenche no painel (são segredos).
services:
  - type: web
    name: avaliaedu-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: ALLOWED_ORIGINS
        # Origens explícitas (sem "*"): o front no Vercel + dev local.
        # Atualize se o domínio do frontend mudar.
        value: "https://frontend-ten-beryl-38.vercel.app,http://localhost:5500,http://127.0.0.1:5500"
      - key: SUPABASE_URL
        value: https://tzurkmkovmmbhxpknask.supabase.co
      # Segredos — preencher no painel do Render (Environment):
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ADMIN_SECRET_KEY
        sync: false
      - key: BASE_URL
        sync: false
