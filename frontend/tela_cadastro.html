<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - AvaliaEdu</title>

  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./css/login.css">
</head>
<body>

  <header>
    <div class="logo">
      <h1>
        <span class="blue2">A</span>
        <span class="green">v</span>
        <span class="yellow">a</span>
        <span class="blue2">l</span>
        <span class="green">i</span>
        <span class="yellow">a</span>
        <span class="blue"> - </span>
        <span class="blue2">E</span>
        <span class="green">D</span>
        <span class="yellow">U</span>
      </h1>
    </div>

    <nav>
      <a href="index.html">Início</a>
      <a href="dashboard-admin.html">Dashboard</a>
      <a href="saiba_mais.html">Saiba Mais</a>
      <a href="certificados.html">Certificados</a>
    </nav>
  </header>

  <main class="login-container">

    <div class="login-box">

      <h2>Crie sua conta</h2>

      <form>

        <label for="nome">Nome Completo:</label>
        <input type="text" id="nome" placeholder="Digite seu nome">

        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Digite seu email">

        <label for="matricula">Matrícula:</label>
        <input type="text" id="matricula" placeholder="Digite sua matrícula">

        <label for="serie">Série:</label>
        <input type="text" id="serie" placeholder="Ex: 3º Ano">

        <label for="senha">Senha:</label>
        <input type="password" id="senha" placeholder="Crie uma senha">

        <label for="confirmar">Confirmar Senha:</label>
        <input type="password" id="confirmar" placeholder="Digite novamente">

        <button type="submit">
          Cadastrar
        </button>

        <p class="cadastro">
          Já possui conta?
          <a href="tela_login.html">Entrar</a>
        </p>

      </form>

    </div>

  </main>

  <footer class="rodape">
    <p>Squad 32 &mdash; Todos os direitos reservados &copy; 2026</p>
  </footer>

</body>
</html>
