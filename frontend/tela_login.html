<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AvaliaEdu</title>
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./css/login.css">
</head>
<body>

  <header>
    <div class="logo">
      <h1>
        <span class="blue2">A</span><span class="green">v</span><span class="yellow">a</span><span class="blue2">l</span><span class="green">i</span><span class="yellow">a</span><span class="blue"> - </span><span class="blue2">E</span><span class="green">D</span><span class="yellow">U</span>
      </h1>
    </div>
    <nav>
      <a href="index.html">Início</a>
      <a href="dashboard-admin.html">Dashboard</a>
      <a href="saiba_mais.html">Saiba como usar o AvaliaEdu</a>
      <a href="certificados.html">Certificados</a>
    </nav>
  </header>

  <main class="login-container">
    <div class="login-box">
      <h2>Acesse sua conta</h2>

      <form method="POST" action="api/login">

        <label for="mail">Email:</label>
        <input type="email" id="mail" name="mail" placeholder="seunome@email.com" />

        <label for="pw">Senha:</label>
        <input type="password" id="pw" name="pw" placeholder="••••••••" />

        <div class="remember">
          <input type="checkbox" id="ck" name="ck" />
          <label for="ck">Lembrar-me</label>
        </div>

        <button type="submit">Login</button>

        <p class="cadastro">Não tem uma conta? <a href="tela_cadastro.html">Cadastre-se</a></p>

      </form>
    </div>
  </main>

  <footer class="rodape">
    <p>Squad 32 &mdash; Todos os direitos reservados &copy; 2026</p>
  </footer>

</body>
</html>
